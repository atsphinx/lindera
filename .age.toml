current_version = "0.0.0"

[[files]]
path = "pyproject.toml"

search = "version = \"{{current_version}}\""
replace = "version = \"{{new_version}}\""


[[files]]
path = "src/atsphinx/lindera_search/__init__.py"

search = "version = \"{{current_version}}\""
replace = "version = \"{{new_version}}\""


[[files]]
path = "CHANGES.rst"

search = """
v{{current_version}}
{{#sameLengthChars}}=@v{{current_version}}{{/sameLengthChars}}
"""
replace = """
v{{new_version}}
{{#sameLengthChars}}=@v{{new_version}}{{/sameLengthChars}}

:Date: {{ now|date }} (Asia/Tokyo)

Breaking changes
----------------

Features
--------

Fixes
-----

Others
------

v{{current_version}}
{{#sameLengthChars}}=@v{{current_version}}{{/sameLengthChars}}
"""


[[files]]
path = ".github/release-body.md"
search = "Release atsphinx-lindera-search v{{ current_version }}"
replace = "Release atsphinx-lindera-search v{{ new_version }}"

[[files]]
path = ".github/release-body.md"
search = "- Changelog is https://github.com/atsphinx/lindera-search/blob/v{{ current_version }}/CHANGES.rst"
replace = "- Changelog is https://github.com/atsphinx/lindera-search/blob/v{{ new_version }}/CHANGES.rst"

[[files]]
path = ".github/release-body.md"
regex = true
search = "- Changes are .+"
replace = "- Changes are https://github.com/atsphinx/lindera-search/compare/v{{ current_version }}...v{{ new_version }}/"
